databases:
  - name: website
    plan: free
    databaseName: website
    user: spurser_user

services:
  - type: web
    plan: free
    name: website
    runtime: python
    buildCommand: "backend/build.sh"
    startCommand: "python3 -m gunicorn backend.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: website
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings